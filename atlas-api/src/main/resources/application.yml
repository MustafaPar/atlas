spring:
  application:
    name: atlas-api

  datasource:
    url: jdbc:postgresql://localhost:5432/atlas
    username: ${DB_USER:atlas}
    password: ${DB_PASS:atlas}
    driver-class-name: org.postgresql.Driver

  jpa:
    # Flyway owns the schema. Hibernate only validates — it never alters tables.
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true

logging:
  level:
    com.atlas: DEBUG
    org.flywaydb: INFO
    org.springframework.web: INFO
